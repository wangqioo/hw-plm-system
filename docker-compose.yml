services:
  plm-postgres:
    image: postgres:16-alpine
    container_name: plm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: plm
      POSTGRES_PASSWORD: plm_secret_2024
      POSTGRES_DB: plm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plm -d plm_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  plm-minio:
    image: minio/minio:latest
    container_name: plm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minio_secret_2024
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  plm-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plm-backend
    restart: unless-stopped
    depends_on:
      plm-postgres:
        condition: service_healthy
      plm-minio:
        condition: service_healthy
    environment:
      POSTGRES_HOST: plm-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: plm_db
      POSTGRES_USER: plm
      POSTGRES_PASSWORD: plm_secret_2024
      SECRET_KEY: plm_jwt_secret_key_change_in_production_2024
      MINIO_ENDPOINT: plm-minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minio_secret_2024
      MINIO_BUCKET: plm-datasheets
      MINIO_SECURE: "false"
      AI_GATEWAY_URL: ${AI_GATEWAY_URL:-https://ai-gateway.happycapy.ai/api/v1/chat/completions}
      AI_GATEWAY_KEY: ${AI_GATEWAY_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  plm-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plm-system
    restart: unless-stopped
    ports:
      - "8088:80"
    depends_on:
      plm-backend:
        condition: service_started
    labels:
      - "description=硬件研发物料管理系统 PLM"

volumes:
  postgres_data:
  minio_data:
